<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بانک مهربانی</title>
</head>
<body>
    <h1>بانک مهربانی</h1>
    <p>از حمایت شما سپاسگزاریم. لطفاً اطلاعات خود را وارد کنید:</p>
    
    <form action="https://formspree.io/f/mqazqjvz" method="POST">
        <label>نام شما:</label><br>
        <input type="text" name="name" required><br><br>
        
        <label>مبلغ کمک (تومان):</label><br>
        <input type="number" name="amount" required><br><br>
        
        <label>توضیحات (اختیاری):</label><br>
        <textarea name="message"></textarea><br><br>
        
        <button type="submit">ارسال درخواست کمک</button>
    </form>
</body>
</html>
